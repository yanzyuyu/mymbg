<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Lane 🌷</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #faf5ff;
        }
    </style>
</head>
<body class="min-h-screen py-6 sm:py-10 px-4">

    <div class="max-w-2xl mx-auto w-full">
        
        <div class="bg-white rounded-2xl shadow-sm p-5 sm:p-6 mb-6 sm:mb-8 flex flex-col sm:flex-row sm:items-center justify-between gap-4 border border-purple-100">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <div class="w-12 h-12 sm:w-14 sm:h-14 bg-purple-100 rounded-full flex items-center justify-center text-purple-600">
                        <i data-lucide="heart" class="w-6 h-6"></i>
                    </div>
                    <span class="bottom-0 right-0 absolute w-3.5 h-3.5 bg-green-400 border-2 border-white rounded-full"></span>
                </div>
                <div>
                    <h1 class="text-base sm:text-lg font-bold text-gray-800">Memory Lane ✨</h1>
                    <p class="text-xs sm:text-sm text-purple-500 font-medium">iish & royco</p>
                </div>
            </div>
            <div>
                <span class="inline-flex items-center gap-1.5 bg-purple-50 text-purple-700 text-xs font-semibold px-3 py-1.5 rounded-full border border-purple-200">
                    <i data-lucide="calendar" class="w-4 h-4"></i> 365 Days
                </span>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-5 sm:p-6 mb-6 sm:mb-8 border border-purple-100">
            <h2 class="text-sm sm:text-base font-semibold text-gray-800 mb-4 flex items-center gap-2">
                <i data-lucide="file-text" class="w-5 h-5 text-purple-600"></i>
                <span>Tambah Kenangan Baru</span>
            </h2>
            <form id="memoryForm" class="space-y-4" onsubmit="addMemory(event)">
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Judul / Pengirim</label>
                    <input type="text" id="senderName" required placeholder="Contoh: iish atau royco" class="w-full text-sm px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Isi Kenangan / Pesan</label>
                    <textarea id="memoryText" rows="3" required placeholder="Tulis pesan atau cerita di sini..." class="w-full text-sm px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition resize-none"></textarea>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">Tipe Kenangan</label>
                        <select id="memoryType" class="w-full text-sm px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition">
                            <option value="chat">Chat</option>
                            <option value="text">Catatan / Cerita</option>
                            <option value="photo">Foto</option>
                            <option value="video">Video</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">Tanggal</label>
                        <input type="date" id="memoryDate" required class="w-full text-sm px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition">
                    </div>
                </div>
                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white text-sm font-medium py-3 rounded-xl transition duration-200 cursor-pointer shadow-sm flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> Simpan Kenangan
                </button>
            </form>
        </div>

        <div class="space-y-4" id="memoryList">
            <div class="bg-white rounded-2xl shadow-sm p-5 sm:p-6 border border-purple-100 hover:shadow-md transition">
                <div class="flex justify-between items-start gap-4 mb-3">
                    <div>
                        <span class="inline-flex items-center gap-1.5 bg-pink-100 text-pink-700 text-xs font-semibold px-2.5 py-1 rounded-full mb-1">
                            <i data-lucide="message-circle" class="w-3.5 h-3.5"></i> Chat
                        </span>
                        <h3 class="font-bold text-gray-800 text-sm mt-1">iish</h3>
                    </div>
                    <span class="text-xs text-gray-400 font-medium">30 Apr 2026</span>
                </div>
                <div class="bg-purple-50 p-4 rounded-xl border border-purple-100 text-gray-700 text-sm space-y-2">
                    <p class="font-medium text-purple-900">wassupp</p>
                    <p class="text-gray-600">baru bangunnn</p>
                    <p class="text-purple-600 font-semibold">wey esemka</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm p-5 sm:p-6 border border-purple-100 hover:shadow-md transition">
                <div class="flex justify-between items-start gap-4 mb-3">
                    <div>
                        <span class="inline-flex items-center gap-1.5 bg-purple-100 text-purple-700 text-xs font-semibold px-2.5 py-1 rounded-full mb-1">
                            <i data-lucide="message-circle" class="w-3.5 h-3.5"></i> Chat
                        </span>
                        <h3 class="font-bold text-gray-800 text-sm mt-1">royco</h3>
                    </div>
                    <span class="text-xs text-gray-400 font-medium">30 Apr 2026</span>
                </div>
                <div class="bg-pink-50 p-4 rounded-xl border border-pink-100 text-gray-700 text-sm space-y-2">
                    <p class="font-semibold text-pink-900">woiii</p>
                    <p class="text-gray-600">esempe</p>
                    <p class="text-pink-600 font-semibold">baru bangun aku</p>
                </div>
            </div>
        </div>

        <p class="text-center text-xs text-gray-400 mt-8">
            Dibuat dengan cinta untuk iish & royco
        </p>
    </div>

    <script>
        // Inisialisasi ikon Lucide di awal
        lucide.createIcons();

        function addMemory(event) {
            event.preventDefault();

            const senderName = document.getElementById('senderName').value;
            const memoryText = document.getElementById('memoryText').value;
            const memoryType = document.getElementById('memoryType').value;
            const memoryDate = document.getElementById('memoryDate').value;

            let formattedDate = 'Hari ini';
            if (memoryDate) {
                const dateObj = new Date(memoryDate);
                const options = { day: 'numeric', month: 'short', year: 'numeric' };
                formattedDate = dateObj.toLocaleDateString('id-ID', options);
            } else {
                const today = new Date();
                formattedDate = today.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
            }

            let typeLabel = 'Catatan';
            let iconName = 'book-open';
            let bgClass = 'bg-blue-50';
            let borderClass = 'border-blue-100';
            
            if (memoryType === 'chat') {
                typeLabel = 'Chat';
                iconName = 'message-circle';
                bgClass = 'bg-pink-50';
                borderClass = 'border-pink-100';
            } else if (memoryType === 'photo') {
                typeLabel = 'Foto';
                iconName = 'image';
                bgClass = 'bg-green-50';
                borderClass = 'border-green-100';
            } else if (memoryType === 'video') {
                typeLabel = 'Video';
                iconName = 'video';
                bgClass = 'bg-purple-50';
                borderClass = 'border-purple-100';
            }

            const memoryList = document.getElementById('memoryList');
            const newMemoryHTML = `
                <div class="bg-white rounded-2xl shadow-sm p-5 sm:p-6 border border-purple-100 hover:shadow-md transition">
                    <div class="flex justify-between items-start gap-4 mb-3">
                        <div>
                            <span class="inline-flex items-center gap-1.5 bg-gray-100 text-gray-700 text-xs font-semibold px-2.5 py-1 rounded-full mb-1">
                                <i data-lucide="${iconName}" class="w-3.5 h-3.5"></i> ${typeLabel}
                            </span>
                            <h3 class="font-bold text-gray-800 text-sm mt-1">${senderName}</h3>
                        </div>
                        <span class="text-xs text-gray-400 font-medium">${formattedDate}</span>
                    </div>
                    <div class="${bgClass} p-4 rounded-xl ${borderClass} text-gray-700 text-sm space-y-2">
                        <p>${memoryText.replace(/\n/g, '<br>')}</p>
                    </div>
                </div>
            `;

            memoryList.insertAdjacentHTML('afterbegin', newMemoryHTML);

            // Memperbarui ikon setelah elemen baru ditambahkan
            lucide.createIcons();

            document.getElementById('memoryText').value = '';
            document.getElementById('senderName').value = '';
            document.getElementById('memoryDate').value = '';
        }
    </script>
</body>
</html>
